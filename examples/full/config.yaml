app:
  name: "xlgo-full-example"
  env: "dev"
  debug: true

server:
  port: 8082
  mode: development
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 30s
  response_mode: business   # business(默认) 或 rest

database:
  driver: mysql
  host: localhost
  port: 3306
  user: root
  password: your_password
  name: xlgo_example
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: change-me-to-a-long-random-secret-at-least-32-chars
  expire: "24h"
  refresh_expire: "168h"
  issuer: xlgo
  algorithm: HS256

log:
  dir: ./logs
  max_size: 100
  max_backups: 30
  max_age: 30
  compress: true
